<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 320" role="img" aria-label="Canales ADC PIC18F4550">
  <defs>
    <style>
      .title { font: bold 15px sans-serif; fill: #14213d; }
      .port { fill: #14213d; stroke: #fca311; stroke-width: 2; }
      .pin { fill: #fff7ed; stroke: #d97706; stroke-width: 1.5; }
      .label { font: 11px sans-serif; fill: #1e293b; }
      .pinlabel { font: 9px sans-serif; fill: #334155; }
      .small { font: 10px sans-serif; fill: #64748b; }
    </style>
  </defs>
  <text x="350" y="24" text-anchor="middle" class="title">Canales ADC  —  10 bits, 13 entradas (Tema 9 CAD)</text>
  <rect x="60" y="50" width="160" height="70" rx="8" class="port"/>
  <text x="140" y="80" text-anchor="middle" fill="#fca311" font="bold 12px sans-serif">Puerto A</text>
  <text x="140" y="100" text-anchor="middle" fill="#f8fafc" font="10px sans-serif">AN0-AN4 (RA0-RA3, RA5)</text>
  <rect x="270" y="50" width="160" height="70" rx="8" class="port"/>
  <text x="350" y="80" text-anchor="middle" fill="#fca311" font="bold 12px sans-serif">Puerto B</text>
  <text x="350" y="100" text-anchor="middle" fill="#f8fafc" font="10px sans-serif">AN8-AN12</text>
  <rect x="480" y="50" width="160" height="70" rx="8" class="port"/>
  <text x="560" y="80" text-anchor="middle" fill="#fca311" font="bold 12px sans-serif">Puerto E</text>
  <text x="560" y="100" text-anchor="middle" fill="#f8fafc" font="10px sans-serif">AN5-AN7 (RE0-RE2)</text>
  <rect x="200" y="160" width="300" height="60" rx="10" class="pin"/>
  <text x="350" y="185" text-anchor="middle" class="label">ADRESH : ADRESL</text>
  <text x="350" y="205" text-anchor="middle" class="pinlabel">Resultado 10 bit � ADCON0/1/2</text>
  <line x1="140" y1="120" x2="140" y2="145" stroke="#64748b" stroke-width="2"/>
  <line x1="350" y1="120" x2="350" y2="145" stroke="#64748b" stroke-width="2"/>
  <line x1="560" y1="120" x2="560" y2="145" stroke="#64748b" stroke-width="2"/>
  <line x1="140" y1="145" x2="560" y2="145" stroke="#64748b" stroke-width="2"/>
  <line x1="350" y1="145" x2="350" y2="160" stroke="#64748b" stroke-width="2"/>
  <text x="350" y="260" text-anchor="middle" class="small">RA4 no es analogico � Vref por defecto VDD/VSS (5V/0V)</text>
  <text x="350" y="285" text-anchor="middle" class="small">Cristal 20 MHz: ADCS = 101 (16 Tosc) en ADCON2</text>
  <text x="350" y="308" text-anchor="middle" class="small">UNEXPO · Ing. Mecatronica  —  basado en datasheet PIC18F4550</text>
</svg>
