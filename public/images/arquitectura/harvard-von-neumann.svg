<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 340" role="img" aria-label="Comparacion arquitectura Von Neumann y Harvard">
  <rect width="820" height="340" fill="#e2e8f0"/>
  <defs>
    <style>
      .title { font: bold 15px sans-serif; fill: #14213d; }
      .label { font: 13px sans-serif; fill: #1e293b; }
      .small { font: 11px sans-serif; fill: #475569; }
      .box { fill: #f1f5f9; stroke: #14213d; stroke-width: 2; }
      .cpu { fill: #fca311; stroke: #b45309; stroke-width: 2; }
      .bus { stroke: #64748b; stroke-width: 2; fill: none; }
    </style>
  </defs>

  <!-- Von Neumann -->
  <text x="205" y="28" text-anchor="middle" class="title">Von Neumann</text>
  <rect x="155" y="45" width="100" height="55" rx="8" class="cpu"/>
  <text x="205" y="78" text-anchor="middle" class="label">CPU</text>
  <rect x="55" y="195" width="300" height="70" rx="8" class="box"/>
  <text x="205" y="225" text-anchor="middle" class="label">Memoria unica</text>
  <text x="205" y="245" text-anchor="middle" class="small">Programa + Datos</text>
  <line x1="205" y1="100" x2="205" y2="195" class="bus"/>
  <text x="222" y="152" text-anchor="start" class="small">Bus unico</text>
  <text x="222" y="166" text-anchor="start" class="small">(dir, control, datos)</text>

  <!-- Harvard -->
  <text x="615" y="28" text-anchor="middle" class="title">Harvard (PIC18F4550)</text>
  <rect x="565" y="45" width="100" height="55" rx="8" class="cpu"/>
  <text x="615" y="78" text-anchor="middle" class="label">CPU</text>
  <rect x="470" y="195" width="130" height="60" rx="8" class="box"/>
  <text x="535" y="220" text-anchor="middle" class="label">Flash</text>
  <text x="535" y="238" text-anchor="middle" class="small">Programa</text>
  <rect x="630" y="195" width="130" height="60" rx="8" class="box"/>
  <text x="695" y="220" text-anchor="middle" class="label">RAM</text>
  <text x="695" y="238" text-anchor="middle" class="small">Datos</text>

  <!-- Bus instrucciones (izquierda) -->
  <line x1="585" y1="72" x2="478" y2="72" class="bus"/>
  <line x1="478" y1="72" x2="478" y2="195" class="bus"/>
  <line x1="478" y1="195" x2="535" y2="195" class="bus"/>
  <text x="462" y="118" text-anchor="end" class="small">Bus</text>
  <text x="462" y="132" text-anchor="end" class="small">instrucciones</text>

  <!-- Bus datos (derecha) -->
  <line x1="645" y1="72" x2="752" y2="72" class="bus"/>
  <line x1="752" y1="72" x2="752" y2="195" class="bus"/>
  <line x1="752" y1="195" x2="695" y2="195" class="bus"/>
  <text x="768" y="118" text-anchor="start" class="small">Bus</text>
  <text x="768" y="132" text-anchor="start" class="small">datos</text>

  <text x="410" y="320" text-anchor="middle" class="small">Basado en Tema 1 — UNEXPO, Ing. Mecatronica</text>
</svg>
