<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 340" role="img" aria-label="Comparacion arquitectura Von Neumann y Harvard">
  <defs>
    <style>
      .title { font: bold 15px sans-serif; fill: #14213d; }
      .label { font: 13px sans-serif; fill: #1e293b; }
      .small { font: 11px sans-serif; fill: #475569; }
      .box { fill: #fff; stroke: #14213d; stroke-width: 2; }
      .cpu { fill: #fca311; stroke: #b45309; stroke-width: 2; }
      .bus { stroke: #64748b; stroke-width: 2; fill: none; }
      .arrow { fill: #64748b; }
    </style>
  </defs>
  <text x="205" y="28" text-anchor="middle" class="title">Von Neumann</text>
  <rect x="155" y="45" width="100" height="55" rx="8" class="cpu"/>
  <text x="205" y="78" text-anchor="middle" class="label">CPU</text>
  <rect x="55" y="170" width="300" height="70" rx="8" class="box"/>
  <text x="205" y="200" text-anchor="middle" class="label">Memoria unica</text>
  <text x="205" y="220" text-anchor="middle" class="small">Programa + Datos</text>
  <line x1="205" y1="100" x2="205" y2="130" class="bus"/>
  <line x1="120" y1="130" x2="290" y2="130" class="bus"/>
  <line x1="120" y1="130" x2="120" y2="170" class="bus"/>
  <line x1="290" y1="130" x2="290" y2="170" class="bus"/>
  <text x="205" y="150" text-anchor="middle" class="small">Bus unico (dir, control, datos)</text>

  <text x="615" y="28" text-anchor="middle" class="title">Harvard (PIC18F4550)</text>
  <rect x="565" y="45" width="100" height="55" rx="8" class="cpu"/>
  <text x="615" y="78" text-anchor="middle" class="label">CPU</text>
  <rect x="470" y="150" width="130" height="60" rx="8" class="box"/>
  <text x="535" y="175" text-anchor="middle" class="label">Flash</text>
  <text x="535" y="195" text-anchor="middle" class="small">Programa</text>
  <rect x="630" y="150" width="130" height="60" rx="8" class="box"/>
  <text x="695" y="175" text-anchor="middle" class="label">RAM</text>
  <text x="695" y="195" text-anchor="middle" class="small">Datos</text>
  <line x1="565" y1="72" x2="500" y2="72" class="bus"/>
  <line x1="500" y1="72" x2="500" y2="150" class="bus"/>
  <line x1="665" y1="72" x2="730" y2="72" class="bus"/>
  <line x1="730" y1="72" x2="730" y2="150" class="bus"/>
  <text x="500" y="125" text-anchor="middle" class="small">Bus instrucciones</text>
  <text x="730" y="125" text-anchor="middle" class="small">Bus datos</text>
  <text x="410" y="320" text-anchor="middle" class="small">Basado en Tema 1  UNEXPO, Ing. Mecatronica</text>
</svg>
