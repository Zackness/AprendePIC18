<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 420" role="img" aria-label="Sistema minimo PIC18F4550">
  <defs>
    <style>
      .title { font: bold 16px sans-serif; fill: #14213d; }
      .label { font: 12px sans-serif; fill: #1e293b; }
      .small { font: 10px sans-serif; fill: #475569; }
      .pic { fill: #14213d; stroke: #fca311; stroke-width: 3; }
      .comp { fill: #fff7ed; stroke: #d97706; stroke-width: 2; }
      .line { stroke: #64748b; stroke-width: 2; fill: none; }
      .pwr { stroke: #dc2626; stroke-width: 2; fill: none; }
      .gnd { stroke: #1e293b; stroke-width: 2; fill: none; }
    </style>
  </defs>
  <text x="360" y="28" text-anchor="middle" class="title">Sistema minimo PIC18F4550 (20 MHz)</text>
  <rect x="250" y="70" width="220" height="180" rx="12" class="pic"/>
  <text x="360" y="105" text-anchor="middle" fill="#fca311" font="bold 14px sans-serif">PIC18F4550</text>
  <text x="360" y="130" text-anchor="middle" fill="#f8fafc" font="11px sans-serif">OSC1 / OSC2</text>
  <text x="360" y="150" text-anchor="middle" fill="#f8fafc" font="11px sans-serif">MCLR</text>
  <text x="360" y="170" text-anchor="middle" fill="#f8fafc" font="11px sans-serif">VDD / VSS</text>
  <text x="360" y="190" text-anchor="middle" fill="#f8fafc" font="11px sans-serif">RA0-RB7, RC, RD, RE</text>
  <ellipse cx="120" cy="120" rx="35" ry="22" class="comp"/>
  <text x="120" y="125" text-anchor="middle" class="label">XTAL</text>
  <text x="120" y="155" text-anchor="middle" class="small">20 MHz</text>
  <rect x="85" y="95" width="12" height="22" class="comp"/>
  <rect x="143" y="95" width="12" height="22" class="comp"/>
  <text x="120" y="88" text-anchor="middle" class="small">C1 / C2 (1nF)</text>
  <rect x="500" y="95" width="70" height="30" rx="6" class="comp"/>
  <text x="535" y="115" text-anchor="middle" class="label">10k</text>
  <rect x="500" y="145" width="70" height="30" rx="6" class="comp"/>
  <text x="535" y="165" text-anchor="middle" class="label">Pulsador</text>
  <rect x="500" y="220" width="90" height="36" rx="6" class="comp"/>
  <text x="545" y="243" text-anchor="middle" class="label">+5 V</text>
  <line x1="155" y1="120" x2="250" y2="120" class="line"/>
  <line x1="470" y1="110" x2="500" y2="110" class="line"/>
  <line x1="535" y1="125" x2="535" y2="145" class="line"/>
  <line x1="470" y1="160" x2="500" y2="160" class="line"/>
  <line x1="535" y1="175" x2="535" y2="220" class="line"/>
  <line x1="360" y1="250" x2="360" y2="290" class="pwr"/>
  <line x1="545" y1="256" x2="545" y2="290" class="pwr"/>
  <line x1="360" y1="290" x2="545" y2="290" class="pwr"/>
  <text x="450" y="285" class="small">VDD</text>
  <line x1="360" y1="250" x2="360" y2="330" class="gnd"/>
  <text x="370" y="325" class="small">VSS / GND</text>
  <text x="360" y="380" text-anchor="middle" class="small">Tema 2 Arquitectura del PIC  UNEXPO, Ing. Mecatronica</text>
  <text x="360" y="400" text-anchor="middle" class="small">Condensador de desacople 10 nF entre VDD y VSS, cerca del PIC</text>
</svg>
