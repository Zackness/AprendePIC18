<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 280" role="img" aria-label="Conexion LED en RB0">
  <defs>
    <style>
      .title { font: bold 15px sans-serif; fill: #14213d; }
      .label { font: 12px sans-serif; fill: #1e293b; }
      .small { font: 10px sans-serif; fill: #475569; }
      .pic { fill: #14213d; stroke: #fca311; stroke-width: 2; }
      .led { fill: #ef4444; stroke: #991b1b; stroke-width: 2; }
      .res { fill: #fff7ed; stroke: #d97706; stroke-width: 2; }
      .wire { stroke: #334155; stroke-width: 2; fill: none; }
      .gnd { stroke: #64748b; stroke-width: 2; }
    </style>
  </defs>
  <text x="320" y="24" text-anchor="middle" class="title">LED en RB0    salida digital</text>
  <rect x="40" y="80" width="140" height="90" rx="10" class="pic"/>
  <text x="110" y="115" text-anchor="middle" fill="#fca311" font="bold 12px sans-serif">PIC18F4550</text>
  <text x="110" y="140" text-anchor="middle" fill="#f8fafc" font="11px sans-serif">RB0</text>
  <rect x="280" y="105" width="70" height="22" rx="4" class="res"/>
  <text x="315" y="120" text-anchor="middle" class="label">330&#937;</text>
  <circle cx="430" cy="116" r="18" class="led"/>
  <text x="430" y="121" text-anchor="middle" fill="#fff" font="bold 10px sans-serif">LED</text>
  <line x1="180" y1="116" x2="280" y2="116" class="wire"/>
  <line x1="350" y1="116" x2="412" y2="116" class="wire"/>
  <line x1="430" y1="134" x2="430" y2="200" class="wire"/>
  <line x1="320" y1="200" x2="430" y2="200" class="gnd"/>
  <line x1="320" y1="200" x2="320" y2="220" class="gnd"/>
  <line x1="300" y1="220" x2="340" y2="220" class="gnd"/>
  <line x1="310" y1="230" x2="330" y2="210" class="gnd"/>
  <text x="320" y="250" text-anchor="middle" class="small">TRISB,0 = 0 (salida)  LATB,0 = 1 enciende el LED</text>
  <text x="320" y="268" text-anchor="middle" class="small">Practica LED    curso UNEXPO</text>
</svg>
