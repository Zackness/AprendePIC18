<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 620" role="img" aria-label="Diagrama de flujo Práctica 2 teclado y LCD">
  <rect width="400" height="620" fill="#e2e8f0"/>
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#64748b"/>
    </marker>
  </defs>
  <text x="200" y="24" text-anchor="middle" font-size="13" fill="#14213d">Práctica 2 — Teclado y LCD</text>
  <ellipse cx="200" cy="56" rx="88" ry="24" fill="#22d3ee" stroke="#0e7490" stroke-width="2"/>
  <text x="200" y="60" text-anchor="middle" font-size="12" fill="#1e293b">INICIO</text>

  <line x1="200" y1="80" x2="200" y2="108" stroke="#64748b" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="60" y="108" width="280" height="44" rx="6" fill="#f1f5f9" stroke="#14213d" stroke-width="2"/>
  <text x="200" y="134" text-anchor="middle" font-size="12" fill="#1e293b">Init LCD (4 bits) + teclado</text>

  <line x1="200" y1="152" x2="200" y2="180" stroke="#64748b" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="60" y="180" width="280" height="44" rx="6" fill="#f1f5f9" stroke="#14213d" stroke-width="2"/>
  <text x="200" y="206" text-anchor="middle" font-size="12" fill="#1e293b">Habilitar IRQ RB4–RB7</text>

  <line x1="200" y1="224" x2="200" y2="252" stroke="#64748b" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="60" y="252" width="280" height="44" rx="6" fill="#cbd5e1" stroke="#334155" stroke-width="2"/>
  <text x="200" y="278" text-anchor="middle" font-size="12" fill="#1e293b">Bucle: esperar bandera de tecla</text>

  <line x1="200" y1="296" x2="200" y2="324" stroke="#64748b" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="50" y="324" width="300" height="52" rx="6" fill="#fca311" stroke="#b45309" stroke-width="2"/>
  <text x="200" y="346" text-anchor="middle" font-size="11" fill="#1e293b">ISR PORTB</text>
  <text x="200" y="364" text-anchor="middle" font-size="11" fill="#475569">Escanear matriz + debounce</text>

  <line x1="200" y1="376" x2="200" y2="404" stroke="#64748b" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="60" y="404" width="280" height="44" rx="6" fill="#cbd5e1" stroke="#334155" stroke-width="2"/>
  <text x="200" y="430" text-anchor="middle" font-size="12" fill="#1e293b">Escribir carácter en LCD</text>

  <line x1="200" y1="448" x2="200" y2="476" stroke="#64748b" stroke-width="2" marker-end="url(#arr)"/>
  <path d="M 200 476 L 320 476 L 320 276 L 200 276" fill="none" stroke="#64748b" stroke-width="2" marker-end="url(#arr)"/>

  <ellipse cx="200" cy="560" rx="88" ry="24" fill="#22d3ee" stroke="#0e7490" stroke-width="2"/>
  <text x="200" y="564" text-anchor="middle" font-size="12" fill="#1e293b">FIN (bucle)</text>
</svg>
