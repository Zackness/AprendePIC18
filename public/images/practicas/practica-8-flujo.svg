<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 540" role="img" aria-label="Diagrama de flujo Práctica 8 comunicación serial">
  <rect width="400" height="540" fill="#e2e8f0"/>
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#64748b"/>
    </marker>
  </defs>
  <text x="200" y="24" text-anchor="middle" font-size="13" fill="#14213d">Práctica 8 — Comunicación serial</text>
  <ellipse cx="200" cy="56" rx="72" ry="24" fill="#22d3ee" stroke="#0e7490" stroke-width="2"/>
  <text x="200" y="60" text-anchor="middle" font-size="12">INICIO</text>

  <line x1="200" y1="80" x2="200" y2="108" stroke="#64748b" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="60" y="108" width="280" height="44" rx="6" fill="#f1f5f9" stroke="#14213d" stroke-width="2"/>
  <text x="200" y="134" text-anchor="middle" font-size="12">Calcular SPBRG, init EUSART</text>

  <line x1="200" y1="152" x2="200" y2="180" stroke="#64748b" stroke-width="2" marker-end="url(#arr)"/>
  <polygon points="200,180 290,220 200,260 110,220" fill="#fca311" stroke="#b45309" stroke-width="2"/>
  <text x="200" y="224" text-anchor="middle" font-size="11">¿RCIF?</text>

  <line x1="200" y1="260" x2="200" y2="288" stroke="#64748b" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="60" y="288" width="280" height="44" rx="6" fill="#cbd5e1" stroke="#334155" stroke-width="2"/>
  <text x="200" y="314" text-anchor="middle" font-size="12">Leer RCREG</text>

  <line x1="200" y1="332" x2="200" y2="360" stroke="#64748b" stroke-width="2" marker-end="url(#arr)"/>
  <polygon points="200,360 290,400 200,440 110,400" fill="#fca311" stroke="#b45309" stroke-width="2"/>
  <text x="200" y="404" text-anchor="middle" font-size="11">¿TXIF?</text>

  <line x1="200" y1="440" x2="200" y2="468" stroke="#64748b" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="60" y="468" width="280" height="44" rx="6" fill="#cbd5e1" stroke="#334155" stroke-width="2"/>
  <text x="200" y="494" text-anchor="middle" font-size="12">Escribir TXREG</text>

  <path d="M 200 512 L 330 512 L 330 170 L 200 170" fill="none" stroke="#64748b" stroke-width="2" marker-end="url(#arr)"/>
</svg>
