<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none" role="img" aria-label="PIC18F4550">
  <defs>
    <linearGradient id="chip-bg" x1="40" y1="40" x2="360" y2="360" gradientUnits="userSpaceOnUse">
      <stop stop-color="#14213d"/>
      <stop offset="1" stop-color="#0b1220"/>
    </linearGradient>
    <linearGradient id="chip-glow" x1="200" y1="60" x2="200" y2="340" gradientUnits="userSpaceOnUse">
      <stop stop-color="#f59e0b" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#22d3ee" stop-opacity="0.08"/>
    </linearGradient>
    <filter id="soft-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <circle cx="200" cy="200" r="170" fill="url(#chip-glow)" opacity="0.55"/>
  <rect x="72" y="72" width="256" height="256" rx="36" fill="url(#chip-bg)" stroke="#f59e0b" stroke-width="4" filter="url(#soft-glow)"/>
  <rect x="104" y="104" width="192" height="192" rx="20" fill="#0f172a" stroke="rgba(34,211,238,0.45)" stroke-width="2"/>
  <text x="200" y="218" text-anchor="middle" fill="#fbbf24" font-family="ui-monospace, monospace" font-size="56" font-weight="700">PIC18</text>
  <text x="200" y="262" text-anchor="middle" fill="#22d3ee" font-family="ui-monospace, monospace" font-size="28" font-weight="600">F4550</text>
  <!-- pins left -->
